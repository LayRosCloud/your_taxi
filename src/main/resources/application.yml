logging:
  level:
    org.springframework.data.redis: DEBUG
    io.lettuce.core: DEBUG # Если используете Lettuce
    redis.clients.jedis: DEBUG # Если используете Jedis

spring:
  springdoc:
    webjars:
      prefix: ""
    api-docs:
      enabled: true
      path: /v3/api-docs
    swagger-ui:
      enabled: true
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  application:
    name: your-taxi
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    user: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    change-log: classpath:db/changelog/master.yml
  data:
    redis:
      host: ${REDIS_HOST}
      database: ${REDIS_DB}
      password: ${REDIS_PASS}
      port: ${REDIS_PORT}
server:
  port: ${SERVER_PORT}
  host: ${SERVER_HOST}
jwt:
  access:
    secretKey: YmFzZTY0ZW5jb2Rlcl9HaG91bEVwdGExMjM0MTJkc2Z2c2Q0M2diZmRz
    ttlMinutes: 60
  refresh:
    secretKey: YmFzZTY0ZW5jb2Rlcl9HaG91bEVwdGExMjM0MTJkc2Z2c2Q0M2diZmRz
    ttlMinutes: 120

websocket:
  ports: ${WEBSOCKET_PORTS}
frontend:
  url: http://localhost:5173