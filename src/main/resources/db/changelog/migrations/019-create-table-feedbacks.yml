databaseChangeLog:
  - changeSet:
      author: betrayal
      id: 019-create-table-feedbacks
      changes:
        - createTable:
            tableName: feedbacks
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: created_by
                  type: UUID
                  constraints:
                    nullable: true
                    references: users(id) ON DELETE SET NULL
                    foreignKeyName: fk_feedbacks_user_id_created_by
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(5000)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(100)
                  constraints:
                    nullable: true
              - column:
                  name: read_by
                  type: UUID
                  constraints:
                    nullable: true
                    references: users(id) ON DELETE SET NULL
                    foreignKeyName: fk_feedbacks_user_id_read_by
              - column:
                  name: read_at
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: BIGINT
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: feedbacks
