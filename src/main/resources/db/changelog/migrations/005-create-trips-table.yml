databaseChangeLog:
  - changeSet:
      author: betrayal
      id: 005-create-trips-table
      changes:
        - createTable:
            tableName: trips
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    references: users(id) ON DELETE CASCADE ON UPDATE CASCADE
                    foreignKeyName: fk_trips_users
              - column:
                  name: car_id
                  type: BIGINT
                  constraints:
                    references: cars(id) ON DELETE CASCADE ON UPDATE CASCADE
                    foreignKeyName: fk_cars_trips
                    nullable: false
              - column:
                  name: created_at
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: end_at
                  type: BIGINT
                  constraints:
                    nullable: true
