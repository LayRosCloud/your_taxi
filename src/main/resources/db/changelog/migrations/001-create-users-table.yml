databaseChangeLog:
  - changeSet:
      author: betrayal
      id: 001-create-users-table
      changes:
        - sql:
            "CREATE TYPE users_role_enum AS ENUM ('USER', 'EMPLOYEE', 'DISPATCHER')"
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: fullname
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_users_email
              - column:
                  name: password
                  type: VARCHAR(300)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: users_role_enum
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: BIGINT
                  constraints:
                    nullable: true

