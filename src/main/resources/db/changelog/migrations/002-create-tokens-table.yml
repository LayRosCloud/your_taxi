databaseChangeLog:
  - changeSet:
      author: betrayal
      id: 002-create-tokens-table
      changes:
        - createTable:
            tableName: tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    references: users(id) ON DELETE CASCADE ON UPDATE CASCADE
                    foreignKeyName: fk_users_tokens_user_id
              - column:
                  name: refresh_token
                  type: VARCHAR(300)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_tokens_refresh
              - column:
                  name: created_at
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expired_at
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: BIGINT
                  constraints:
                    nullable: true

