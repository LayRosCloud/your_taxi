databaseChangeLog:
  - changeSet:
      author: betrayal
      id: 003-create-users-info
      changes:
        - createTable:
            tableName: users_info
            columns:
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
                    references: users(id) ON DELETE CASCADE ON UPDATE CASCADE
                    foreignKeyName: fk_users_user_profile
              - column:
                  name: phone
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_users_phone