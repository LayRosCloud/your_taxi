    api-docs:
      enabled: true
      path: /v3/api-docs
    swagger-ui:
      enabled: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:vogistv@gmail.com}
    password: ${MAIL_PASSWORD:dtlzyhnlxekwledl}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  application:
    name: your-taxi
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
