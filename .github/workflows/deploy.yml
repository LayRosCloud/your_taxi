name: Java CI/CD with Maven
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'
          cache: maven
      - name: Test with Maven
        run: mvn -B package --file pom.xml
  deploy:
    runs-on: self-hosted
    needs: [build]
    steps:
      - name: Cd to folder
        run: cd /home/runner/projects/your_taxi
      - name: Git checkout
        uses: actions/checkout@v4
      - name: Docker build
        run: docker compose -f compose.yaml up -d --build


