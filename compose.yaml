services:
  osrm-router:
    image: osrm/osrm-backend:latest
    container_name: osrm-router
    ports:
      - "5000:5000"
    volumes:
      - ./maps:/data
    command: >
      sh -c "if [ ! -f /data/combined.osrm ]; then echo 'Starting map processing...'; osrm-extract -p /opt/car.lua /data/combined.osm.pbf && osrm-partition /data/combined.osrm && osrm-customize /data/combined.osrm; else echo 'Using cached map data.'; fi; osrm-routed --algorithm mld /data/combined.osrm"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - app_network
  taxi:
    build:
      dockerfile: Dockerfile
      context: .
    restart: always
    environment:
      - "DB_PASS=${DB_PASS}"
      - "DB_USER=${DB_USER}"
      - "DB_NAME=${DB_NAME}"
      - "DB_PORT=${DB_PORT}"
      - "DB_HOST=${DB_HOST}"
      - "MAIL_HOST=${MAIL_HOST}"
      - "MAIL_PORT=${MAIL_PORT}"
      - "MAIL_USERNAME=${MAIL_USERNAME}"
      - "MAIL_PASSWORD=${MAIL_PASSWORD}"
      - "WEBSOCKET_PORTS=${WEBSOCKET_PORTS}"
      - "REDIS_HOST=${REDIS_HOST}"
      - "REDIS_PASS=${REDIS_PASS}"
      - "REDIS_DB=${REDIS_DB}"
      - "REDIS_PORT=${REDIS_PORT}"
      - "SERVER_PORT=${SERVER_PORT}"
      - "SERVER_HOST=${SERVER_HOST}"
      - "OSRM_HOST=${OSRM_HOST}"
      - "ACCESS_SECRET_KEY=${ACCESS_SECRET_KEY}"
      - "REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}"
      - "REFRESH_TTL_MINUTES=${REFRESH_TTL_MINUTES}"
      - "ACCESS_TTL_MINUTES=${ACCESS_TTL_MINUTES}"
      - "FRONTEND_URL=${FRONTEND_URL}"
    depends_on:
      redis_taxi:
        condition: service_healthy
      pg_taxi:
        condition: service_started
      osrm-router:
        condition: service_started
    networks:
      - app_network
    ports:
      - ${EXPOSE_SERVER_PORT}:${SERVER_PORT}
  pg_taxi:
    image: "postgis/postgis:15-3.4"
    container_name: pg_taxi
    restart: always
    environment:
      - "POSTGRES_DB=${DB_NAME}"
      - "POSTGRES_PASSWORD=${DB_PASS}"
      - "POSTGRES_USER=${DB_USER}"
      - "TZ=UTC"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network
  redis_taxi:
    image: redis:7-alpine
    container_name: redis_taxi
    command: ["redis-server", "--requirepass", "${REDIS_PASS}"]
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_redis:/redis
    networks:
      - app_network

volumes:
  pg_data:
  pg_redis:

networks:
  app_network:
    driver: bridge